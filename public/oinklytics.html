<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oinklytics POS — Complete Unified System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#e11d48', secondary: '#4f46e5', accent: '#f59e0b' } } } }
    </script>
    <style>
        :root { --bg-main: #f3f4f6; --bg-card: #ffffff; --text-main: #1f2937; --text-muted: #6b7280; --border-color: #e5e7eb; }
        .dark { --bg-main: #020617; --bg-card: #0f172a; --text-main: #f3f4f6; --text-muted: #9ca3af; --border-color: #1e293b; }
        body { background-color: var(--bg-main); color: var(--text-main); -webkit-tap-highlight-color: transparent; }
        .bg-card { background-color: var(--bg-card); } .text-muted { color: var(--text-muted); } .border-theme { border-color: var(--border-color); }
        input, select, textarea { font-size: 16px !important; }
        button, .nav-btn { min-height: 44px; display: flex; align-items: center; } .nav-btn { justify-content: flex-start; }
        @media print { body * { visibility: hidden; } #printable-receipt, #printable-receipt * { visibility: visible; } #printable-receipt { position: absolute; left: 0; top: 0; width: 80mm; padding: 5mm; } .no-print { display: none !important; } }
        .scrollbar-hide::-webkit-scrollbar { display: none; } .fade-in { animation: fadeIn 0.3s ease-in-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .typing-indicator span { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); animation: typing 1.4s infinite; margin: 0 2px; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; } .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }

        .payment-btn { transition: all 0.2s; }
        .payment-btn.active { ring: 2px; ring-offset: 2px; transform: scale(1.02); }
    </style>
</head>
<body class="transition-colors duration-300 font-sans antialiased overflow-hidden">

    <!-- SESSION WARNING -->
    <div id="session-warning" class="hidden fixed top-0 left-0 right-0 z-[70] bg-yellow-500 text-black text-center py-2 font-bold text-sm no-print">
        ⚠️ Session expires in 2 min — <button onclick="resetSessionTimer()" class="underline font-bold ml-2">Stay signed in</button>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-rose-500 to-indigo-600 dark:from-rose-900 dark:to-indigo-950 p-4">
        <div class="bg-white dark:bg-gray-800 p-6 md:p-8 rounded-2xl shadow-2xl w-full max-w-md fade-in relative">
            <button onclick="toggleTheme()" class="absolute top-4 right-4 w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center hover:bg-gray-200 dark:hover:bg-gray-600 transition">
                <i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:block text-yellow-400"></i>
            </button>
            <div class="text-center mb-6"><div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary text-white text-3xl mb-4">🥩</div><h1 class="text-2xl font-bold text-gray-900 dark:text-white">Oinklytics POS</h1><p class="text-sm text-gray-500">Meat Management System</p></div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Role</label>
                    <div class="grid grid-cols-3 gap-2">
                        <label class="flex items-center justify-center gap-2 p-2 rounded-lg border dark:border-gray-600 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700"><input type="radio" name="login-role" value="admin" class="w-4 h-4 text-primary" checked> <span class="text-sm">Admin</span></label>
                        <label class="flex items-center justify-center gap-2 p-2 rounded-lg border dark:border-gray-600 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700"><input type="radio" name="login-role" value="supervisor" class="w-4 h-4 text-primary"> <span class="text-sm">Supervisor</span></label>
                        <label class="flex items-center justify-center gap-2 p-2 rounded-lg border dark:border-gray-600 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700"><input type="radio" name="login-role" value="cashier" class="w-4 h-4 text-primary"> <span class="text-sm">Cashier</span></label>
                    </div>
                </div>
                <div><label class="block text-sm font-medium mb-1">Username</label><input type="text" id="login-user" class="w-full px-4 py-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600" placeholder="admin"></div>
                <div><label class="block text-sm font-medium mb-1">Password</label><div class="relative"><input type="password" id="login-pass" class="w-full px-4 py-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600" placeholder="••••••••"><button onclick="togglePassword()" class="absolute right-3 top-3 text-gray-500"><i class="fas fa-eye" id="pass-eye"></i></button></div></div>
                <div id="login-error" class="hidden text-red-500 text-sm text-center p-2 bg-red-50 dark:bg-red-900/20 rounded"></div>
                <button onclick="handleLogin()" class="w-full py-3 bg-primary hover:bg-rose-700 text-white font-bold rounded-lg justify-center">🔐 Sign In</button>
                
                <div class="border-t border-theme pt-4 mt-4">
                    <p class="text-xs text-center text-muted mb-2">— Quick Login —</p>
                    <div class="grid grid-cols-3 gap-2 text-xs text-center">
                        <button onclick="quickLogin('admin','admin123','admin')" class="p-2 rounded bg-gray-100 dark:bg-gray-700 hover:bg-gray-200">⚙️ Admin<br><span class="text-gray-500">admin123</span></button>
                        <button onclick="quickLogin('supervisor','sup123','supervisor')" class="p-2 rounded bg-gray-100 dark:bg-gray-700 hover:bg-gray-200">👔 Supervisor<br><span class="text-gray-500">sup123</span></button>
                        <button onclick="quickLogin('cashier1','cash123','cashier')" class="p-2 rounded bg-gray-100 dark:bg-gray-700 hover:bg-gray-200">🛒 Cashier<br><span class="text-gray-500">cash123</span></button>
                    </div>
                </div>
            </div>
            <p class="text-xs text-center mt-4 text-gray-500">🔒 All data is encrypted in transit.</p>
        </div>
    </div>

    <!-- MAIN APP LAYOUT -->
    <div id="app-layout" class="hidden flex h-screen overflow-hidden">
        <aside class="w-64 bg-card border-r border-theme flex-col hidden md:flex no-print">
            <div class="p-4 border-b border-theme flex items-center gap-3 min-h-[64px]"><div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white text-xl">🥩</div><div><h1 class="font-bold text-lg">Oinklytics POS</h1><p class="text-xs text-muted">Secured 🔐</p></div></div>
            <nav class="flex-1 overflow-y-auto p-4 space-y-1" id="sidebar-nav"></nav>
            <div class="p-4 border-t border-theme"><button onclick="doLogout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400 hover:bg-red-200 dark:hover:bg-red-900/50 transition text-sm font-medium"><i class="fas fa-sign-out-alt w-5 text-center"></i> Sign Out</button></div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden w-full">
            <header class="bg-card border-b border-theme p-4 flex justify-between items-center no-print min-h-[64px]">
                <h2 id="page-title" class="text-xl font-bold truncate">Dashboard</h2>
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <button onclick="toggleNotifications()" class="relative p-2 text-muted hover:text-primary transition"><i class="fas fa-bell text-xl"></i><span id="notif-badge" class="absolute top-0 right-0 w-5 h-5 bg-primary text-white text-xs rounded-full flex items-center justify-center">3</span></button>
                        <div id="notif-dropdown" class="hidden absolute right-0 mt-2 w-80 bg-card border border-theme rounded-xl shadow-xl z-50 fade-in">
                            <div class="p-3 border-b border-theme font-bold flex justify-between items-center"><span>🔔 Notifications</span><button onclick="clearNotifications()" class="text-xs text-primary hover:underline">Clear All</button></div>
                            <div id="notif-list" class="max-h-64 overflow-y-auto"></div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-secondary flex items-center justify-center text-white font-bold" id="user-avatar">A</div><div class="text-sm hidden sm:block"><p class="font-bold" id="user-name">Admin</p><p class="text-xs text-muted" id="user-role">Administrator</p></div></div>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto p-4 md:p-6" id="main-content"></div>
        </main>
    </div>
    <div id="modals-container"></div>

    <script>
        // ==========================================
        // STATE & CONFIGURATION
        // ==========================================
        const STATE = {
            currentUser: null, cart: [], sessionTimer: null, warningTimer: null,
            paymentMethod: 'cash',
            mpesaRef: '',
            cashAmount: 0,
            mpesaAmount: 0,
            selectedCustomer: null,
            theme: localStorage.getItem('oinklytics-theme') || 'dark',
            users: [
                { id: 1, name: 'Jimmy Otina', username: 'admin', password: 'admin123', role: 'admin', status: 'Active', lastLogin: 'Today 08:00 AM' },
                { id: 2, name: 'Jane Cashier', username: 'cashier1', password: 'cash123', role: 'cashier', status: 'Active', lastLogin: 'Today 07:30 AM' },
                { id: 3, name: 'John Supervisor', username: 'supervisor', password: 'sup123', role: 'supervisor', status: 'Active', lastLogin: 'Today 07:45 AM' }
            ],
            products: [
                { code: 'P001', name: 'Pork Chops', category: 'Pork Cuts', unit: 'kg', price: 550, status: 'Active', stock: 55 },
                { code: 'P002', name: 'Pork Ribs', category: 'Pork Cuts', unit: 'kg', price: 600, status: 'Active', stock: 35 },
                { code: 'P003', name: 'Pork Belly', category: 'Pork Cuts', unit: 'kg', price: 450, status: 'Active', stock: 8 },
                { code: 'P004', name: 'Pork Shoulder', category: 'Pork Cuts', unit: 'kg', price: 400, status: 'Active', stock: 30 },
                { code: 'P005', name: 'Pork Leg (Ham)', category: 'Pork Cuts', unit: 'kg', price: 480, status: 'Active', stock: 25 },
                { code: 'P006', name: 'Bones / Offcuts', category: 'By-Products', unit: 'kg', price: 150, status: 'Active', stock: 10 },
                { code: 'P007', name: 'Liver', category: 'Offal', unit: 'kg', price: 300, status: 'Active', stock: 5 },
                { code: 'P008', name: 'Intestines', category: 'Offal', unit: 'kg', price: 250, status: 'Active', stock: 5 },
                { code: 'P009', name: 'Kidneys', category: 'Offal', unit: 'kg', price: 280, status: 'Active', stock: 8 },
                { code: 'P010', name: 'Pork Sausages', category: 'Processed', unit: 'pack', price: 250, status: 'Active', stock: 12 },
                { code: 'P011', name: 'Minced Meat', category: 'Processed', unit: 'kg', price: 400, status: 'Active', stock: 18 }
            ],
            batches: [
                { id: 'OIN-20231024-001', source: 'Oinklytics Farms', weight: 120, currentWeight: 85, useBy: '2023-10-30', status: 'Active', costPerKg: 350, inspection: 'Accepted', receivedBy: 'J. Otina', docRef: 'INV-001', 
                  cutProducts: [
                      { name: 'Pork Chops', weight: 40, category: 'Pork Cuts' }, 
                      { name: 'Pork Ribs', weight: 25, category: 'Pork Cuts' }, 
                      { name: 'Pork Belly', weight: 20, category: 'Pork Cuts' }, 
                      { name: 'Bones/Offcuts', weight: 10, category: 'By-Products' }
                  ] 
                },
                { id: 'EXT-KCMEAT-20231024-002', source: 'KC Meat Supplies', weight: 85, currentWeight: 40, useBy: '2023-10-26', status: 'Expiring', costPerKg: 380, inspection: 'Partially Accepted', receivedBy: 'J. Smith', docRef: 'PO-045', 
                  cutProducts: [
                      { name: 'Pork Shoulder', weight: 30, category: 'Pork Cuts' }, 
                      { name: 'Pork Leg', weight: 25, category: 'Pork Cuts' }, 
                      { name: 'Liver', weight: 5, category: 'Offal' }, 
                      { name: 'Intestines', weight: 5, category: 'Offal' }
                  ] 
                }
            ],
            customers: [
                { id: 1, name: 'John Doe', phone: '0712345678', type: 'Retail', area: 'Westlands', birthday: 'March', preferred: 'Pork Chops', points: 450, spent: 45000, consent: true, registered: '2023-09-15', lastVisit: 'Today' },
                { id: 2, name: 'Jane Smith', phone: '0798765432', type: 'Restaurant', area: 'Kilimani', birthday: 'July', preferred: 'Pork Ribs, Belly', points: 1200, spent: 120000, consent: true, registered: '2023-08-01', lastVisit: 'Yesterday' },
                { id: 3, name: 'Mike Johnson', phone: '0723456789', type: 'Reseller', area: 'Eastleigh', birthday: 'January', preferred: 'Minced Meat', points: 890, spent: 89000, consent: true, registered: '2023-07-20', lastVisit: '2 days ago' }
            ],
            notifications: [
                { id: 1, type: 'expiry', icon: 'fa-clock', color: 'text-red-500', msg: 'Batch EXT-002 (Pork Belly) expires in 4 hours', time: '10:00 AM' },
                { id: 2, type: 'temp', icon: 'fa-thermometer-half', color: 'text-orange-500', msg: 'Upright Chiller temp is 5.2°C (Threshold: 4°C)', time: '09:30 AM' },
                { id: 3, type: 'stock', icon: 'fa-box-open', color: 'text-yellow-500', msg: 'Low stock: Pork Sausages (12 packs left)', time: '08:15 AM' }
            ],
            equipment: [],
            auditLog: [
                { time: '2023-10-24 08:00', user: 'admin', role: 'Admin', action: 'Login', desc: 'User logged in', ip: '192.168.1.10' },
                { time: '2023-10-24 08:05', user: 'admin', role: 'Admin', action: 'Stock Change', desc: 'Received batch OIN-001: 120kg', ip: '192.168.1.10' },
                { time: '2023-10-24 09:12', user: 'cashier1', role: 'Cashier', action: 'Sale', desc: 'Receipt RCP-001: KES 1,200', ip: '192.168.1.15' },
                { time: '2023-10-24 10:30', user: 'supervisor', role: 'Supervisor', action: 'Discount', desc: 'Approved 15% discount for John Doe', ip: '192.168.1.12' }
            ],
            todaySales: { total: 48250, transactions: 37, avgTicket: 1304, cashSales: 28150, mpesaSales: 20100, yesterdayTotal: 43080, lastWeekAvg: 41500,
                byProduct: [{ name: 'Pork Chops', qty: 15, revenue: 8250 }, { name: 'Pork Ribs', qty: 12, revenue: 7200 }, { name: 'Pork Belly', qty: 10, revenue: 4500 }, { name: 'Pork Sausages', qty: 8, revenue: 2000 }, { name: 'Minced Meat', qty: 12, revenue: 4800 }] },
            wastage: { today: 3.2, todayValue: 2560, byReason: [{ reason: 'Expired', qty: 1.5, value: 1200 }, { reason: 'Quality Failure', qty: 1.0, value: 800 }], byProduct: [{ name: 'Liver', qty: 1.5 }, { name: 'Intestines', qty: 1.0 }] },
            shift: { id: 'SHF-001', period: 'Morning', expectedCash: 28150, actualCash: null, mpesaTotal: 20100, variance: 0, transactions: 37, closed: false },
            settings: { businessName: 'Oinklytics Butchery', currency: 'KES', lowStockThreshold: 10, expiryWarningDays: 3, freezerMaxTemp: -15, chillerMaxTemp: 4, earnRate: 100, pointValue: 1, minRedeem: 100, maxRedeemPct: 20, pointsExpiry: 12, mpesaMode: 'Manual', darajaShortcode: '', etimsMode: 'Manual' },

        };

        // ==========================================
        // NAVIGATION - CASHIER CANNOT SEE DASHBOARD
        // ==========================================
        const NAV_ITEMS = [
            { id: 'dashboard', label: 'Dashboard', icon: 'fa-chart-line', roles: ['admin', 'supervisor'] },
            { id: 'pos', label: 'POS / Checkout', icon: 'fa-cash-register', roles: ['admin', 'supervisor', 'cashier'] },
            { id: 'products', label: 'Products', icon: 'fa-box', roles: ['admin', 'supervisor'] },
            { id: 'batches', label: 'Batches & Cutting', icon: 'fa-truck-loading', roles: ['admin', 'supervisor'] },
            { id: 'inventory', label: 'Inventory', icon: 'fa-warehouse', roles: ['admin', 'supervisor', 'cashier'] },
            { id: 'customers', label: 'Customers', icon: 'fa-users', roles: ['admin', 'supervisor', 'cashier'] },
            { id: 'shift', label: 'Shift Close', icon: 'fa-clock', roles: ['admin', 'supervisor'] },
            { id: 'reports', label: 'Reports', icon: 'fa-file-alt', roles: ['admin', 'supervisor'] },
            { id: 'equipment', label: 'Equipment', icon: 'fa-microchip', roles: ['admin', 'supervisor'] },
            { id: 'audit', label: 'Audit Log', icon: 'fa-shield-alt', roles: ['admin'] },
            { id: 'settings', label: 'Settings', icon: 'fa-cog', roles: ['admin'] }
        ];

        // ==========================================
        // DATABASE LOADING
        // ==========================================
        async function loadAllData() {
            const products = await apiGet('products');
            if (products) STATE.products = products;
            const customers = await apiGet('customers');
            if (customers) STATE.customers = customers;
            const batches = await apiGet('batches');
            if (batches) STATE.batches = batches;
            const users = await apiGet('users');
            if (users) STATE.users = users;
            const settings = await apiGet('settings');
            if (settings) Object.assign(STATE.settings, settings);
            const notifications = await apiGet('notifications');
            if (notifications) STATE.notifications = notifications;
            const categories = await apiGet('categories');
            if (categories) STATE.categories = categories;
            const equipment = await apiGet('equipment');
            if (equipment) STATE.equipment = equipment;
        }

        // ==========================================
        // AUTH & SESSION
        // ==========================================
        function initTheme() { document.documentElement.classList.toggle('dark', STATE.theme === 'dark'); }
        function toggleTheme() { STATE.theme = STATE.theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('oinklytics-theme', STATE.theme); initTheme(); }
        function togglePassword() { const i = document.getElementById('login-pass'); const ic = document.getElementById('pass-eye'); if(i.type==='password'){i.type='text';ic.classList.replace('fa-eye','fa-eye-slash');}else{i.type='password';ic.classList.replace('fa-eye-slash','fa-eye');} }
        function quickLogin(u, p, r) { document.getElementById('login-user').value = u; document.getElementById('login-pass').value = p; document.querySelector(`input[name="login-role"][value="${r}"]`).checked = true; }
        
        async function handleLogin() {
            const username = document.getElementById('login-user').value.trim().toLowerCase();
            const password = document.getElementById('login-pass').value;
            const role = document.querySelector('input[name="login-role"]:checked').value;
            const result = await apiPost('login', { username, password, role });
            if (result && result.success) {
                finalizeLogin(result.user);
            } else { document.getElementById('login-error').innerText = result?.error || 'Invalid credentials.'; document.getElementById('login-error').classList.remove('hidden'); }
        }
        
        async function finalizeLogin(user) {
            STATE.currentUser = user; user.lastLogin = 'Just now';
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-layout').classList.remove('hidden'); document.getElementById('app-layout').classList.add('flex');
            document.getElementById('user-name').innerText = user.name; document.getElementById('user-role').innerText = user.role.charAt(0).toUpperCase() + user.role.slice(1);
            document.getElementById('user-avatar').innerText = user.name.charAt(0).toUpperCase();
            renderSidebar();
            // Load all data from database
            await loadAllData();
            // CASHIER GOES DIRECTLY TO POS, NOT DASHBOARD
            navigateTo(user.role === 'cashier' ? 'pos' : 'dashboard'); 
            startSessionTimer();
        }
        function doLogout() {
            STATE.currentUser = null; STATE.cart = []; STATE.selectedCustomer = null;
            clearTimeout(STATE.sessionTimer); clearTimeout(STATE.warningTimer);
            document.getElementById('session-warning').classList.add('hidden');
            document.getElementById('app-layout').classList.add('hidden'); document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('login-pass').value = '';
        }
        function withAdminPin(callback) {
            if (STATE.currentUser?.role === 'admin') { callback(); return; }
            document.getElementById('modals-container').innerHTML = `<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm no-print fade-in p-4"><div class="bg-card p-6 rounded-xl shadow-xl w-full max-w-sm border border-theme"><div class="flex justify-between items-center mb-4"><h3 class="font-bold text-lg">Admin PIN Required</h3><button onclick="closeModal()" class="text-muted w-10 h-10 justify-center"><i class="fas fa-times"></i></button></div><p class="text-sm text-muted mb-4">Enter admin password to authorize this action.</p><input type="password" id="admin-pin-input" placeholder="Admin password..." class="w-full px-3 py-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600 outline-none mb-2"><p id="admin-pin-error" class="text-red-500 text-sm hidden">Incorrect PIN</p><div class="flex gap-2 mt-4"><button onclick="closeModal()" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-lg justify-center">Cancel</button><button onclick="verifyAdminPin()" class="flex-1 py-3 bg-primary text-white rounded-lg justify-center font-bold">Verify</button></div></div></div>`;
            STATE._pinCallback = callback;
        }
        async function verifyAdminPin() {
            const pin = document.getElementById('admin-pin-input').value.trim();
            const res = await apiPost('verify_pin', { password: pin });
            if (res && res.success) {
                closeModal();
                const cb = STATE._pinCallback;
                delete STATE._pinCallback;
                if (cb) cb();
            } else {
                document.getElementById('admin-pin-error').classList.remove('hidden');
                document.getElementById('admin-pin-input').value = '';
                document.getElementById('admin-pin-input').focus();
            }
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
        function startSessionTimer() {
            clearTimeout(STATE.sessionTimer); clearTimeout(STATE.warningTimer);
            document.getElementById('session-warning').classList.add('hidden');
            STATE.warningTimer = setTimeout(() => document.getElementById('session-warning').classList.remove('hidden'), 28 * 60 * 1000);
            STATE.sessionTimer = setTimeout(doLogout, 30 * 60 * 1000);
        }
        function resetSessionTimer() { if (STATE.currentUser) startSessionTimer(); }
        document.addEventListener('click', resetSessionTimer); document.addEventListener('keypress', resetSessionTimer);

        // ==========================================
        // NAVIGATION & NOTIFICATIONS
        // ==========================================
        function renderSidebar() {
            document.getElementById('sidebar-nav').innerHTML = NAV_ITEMS.filter(i => i.roles.includes(STATE.currentUser.role))
                .map(i => `<button onclick="navigateTo('${i.id}')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition text-left text-sm font-medium"><i class="fas ${i.icon} w-5 text-center"></i> <span>${i.label}</span></button>`).join('');
        }
        function navigateTo(pageId) {
            document.getElementById('page-title').innerText = NAV_ITEMS.find(n => n.id === pageId)?.label || pageId;
            const c = document.getElementById('main-content');
            if(pageId==='dashboard') renderDashboard(c); else if(pageId==='pos') renderPOS(c); else if(pageId==='products') renderProducts(c); else if(pageId==='batches') renderBatches(c); else if(pageId==='inventory') renderInventory(c); else if(pageId==='customers') renderCustomers(c); else if(pageId==='shift') renderShift(c); else if(pageId==='reports') renderReports(c); else if(pageId==='equipment') renderEquipment(c); else if(pageId==='audit') renderAudit(c); else if(pageId==='settings') renderSettings(c);
        }

        function setPaymentMethod(method) {

            else if (method === 'mixed') {

        function updateMixedPayment() {
            const total = STATE.cart.reduce((s,i)=>s+(i.price*i.qty),0);
            const remaining = total - STATE.cashAmount - STATE.mpesaAmount;
            const remainingEl = document.getElementById('mixed-remaining');
            if (remainingEl) { remainingEl.innerText = `KES ${remaining.toFixed(0)}`; remainingEl.className = remaining === 0 ? 'text-green-600 font-bold' : 'text-red-600 font-bold'; }
        }

        // ==========================================
        // DATABASE API LAYER
        // ==========================================
        const API = '/oinklytics/api/index.php';
        async function api(method, entity, data, id) {
            let url = `${API}?entity=${entity}`;
            if (id) url += `&id=${id}`;
            if (method === 'GET' && data) url += `&search=${encodeURIComponent(data)}`;
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (method !== 'GET') opts.body = JSON.stringify(data);
            try {
                const res = await fetch(url, opts);
                return await res.json();
            } catch(e) { console.error('API error:', e); return null; }
        }
        async function apiGet(entity, search) { return api('GET', entity, search); }
        async function apiPost(entity, data) { return api('POST', entity, data); }
        async function apiPut(entity, data, id) { return api('PUT', entity, data, id); }
        async function apiDel(entity, id) { return api('DELETE', entity, null, id); }

            const price = document.getElementById('prod-price').value;
            const status = document.getElementById('prod-status').value;
            if (!code || !name || !price) { alert('Code, Name, and Price are required.'); return; }
            const data = { code, name, category, unit, price, status };
            if (STATE.editingProductCode) {
                await apiPut('products', data, STATE.editingProductCode);
            } else {
                await apiPost('products', data);
            }
            closeModal();
            await loadAllData();
        }

        async function completeSale(t) {
            const batchId = document.getElementById('checkout-batch').value;
            if (!batchId) { alert('⚠️ You MUST select a Batch Number to complete the sale!'); return; }
            const batch = STATE.batches.find(b => b.id === batchId);
            const totalQty = STATE.cart.reduce((sum, item) => sum + item.qty, 0);
            if(batch && batch.currentWeight >= totalQty) { batch.currentWeight -= totalQty; apiPut('batches', { source: batch.source, weight: batch.weight, current_weight: batch.currentWeight, use_by: batch.use_by, status: batch.status, cost_per_kg: batch.cost_per_kg }, batchId); } else { alert('⚠️ Insufficient stock in selected batch!'); return; }
            
            // Update customer points if applicable
            if (STATE.selectedCustomer) {
                const pointsEarned = Math.floor(t / 100);
                STATE.selectedCustomer.points += pointsEarned;
                STATE.selectedCustomer.spent += t;
                STATE.selectedCustomer.lastVisit = 'Today';
                apiPut('customers', STATE.selectedCustomer, STATE.selectedCustomer.id);
            }
            
            let paymentDetails = '';
            if (STATE.paymentMethod === 'cash') paymentDetails = `<p>Payment: Cash</p>`;
            else if (STATE.paymentMethod === 'mpesa') paymentDetails = `<p>Payment: M-Pesa</p><p>Ref: ${STATE.mpesaRef || 'N/A'}</p>`;
            else if (STATE.paymentMethod === 'mixed') paymentDetails = `<p>Payment: Mixed</p><p>Cash: KES ${STATE.cashAmount}</p><p>M-Pesa: KES ${STATE.mpesaAmount}</p><p>Ref: ${STATE.mpesaRef || 'N/A'}</p>`;
            
            const customerInfo = STATE.selectedCustomer ? `<p>Customer: ${STATE.selectedCustomer.name}</p><p>Phone: ${STATE.selectedCustomer.phone}</p><p>Points Earned: ${Math.floor(t/100)}</p>` : '<p>Customer: Walk-in Guest</p>';
            
            // Save sale to database
            const receiptNo = 'RCP-' + Date.now().toString().slice(-6);
            apiPost('sales', {
                receipt_no: receiptNo,
                total: t,
                payment_method: STATE.paymentMethod,
                mpesa_ref: STATE.mpesaRef || '',
                cash_amount: STATE.cashAmount || 0,
                mpesa_amount: STATE.mpesaAmount || 0,
                customer_id: STATE.selectedCustomer?.id || null,
                batch_id: batchId,
                items: STATE.cart
            });
            apiPost('audit', {
                time: new Date().toLocaleString(), user: STATE.currentUser?.name || 'Unknown',
                role: STATE.currentUser?.role || '', action: 'Sale',
                description: `Receipt ${receiptNo}: KES ${t}`, ip: 'Local'
            });
            
            closeModal(); 
            document.getElementById('modals-container').innerHTML = `<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm no-print fade-in p-4"><div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-xl w-full max-w-sm border border-theme"><div id="printable-receipt" class="bg-white text-black p-2 font-mono text-xs"><div class="text-center mb-2"><h2 class="font-bold text-sm">OINKLYTICS BUTCHERY</h2></div><div class="border-b border-dashed border-black pb-1 mb-1"><p>Receipt #: <span class="font-bold">${receiptNo}</span></p><p>Date: ${new Date().toLocaleString()}</p><p>Batch: ${batchId}</p>${customerInfo}${paymentDetails}</div><div class="space-y-1 mb-1">${STATE.cart.map(i=>`<div class="flex justify-between"><span>${i.name} x${i.qty}</span><span>${i.price*i.qty}</span></div>`).join('')}</div><div class="border-t border-dashed border-black pt-1"><div class="flex justify-between font-bold"><span>TOTAL</span><span>KES ${t}</span></div></div></div><div class="flex gap-2 mt-4 no-print"><button onclick="window.print()" class="flex-1 py-3 bg-blue-600 text-white rounded-lg justify-center">🖨 Print</button><button onclick="closeModal(); STATE.cart=[]; STATE.paymentMethod='cash'; STATE.mpesaRef=''; STATE.cashAmount=0; STATE.mpesaAmount=0; STATE.selectedCustomer=null; renderCart();" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-lg justify-center">Done</button></div></div></div>`;
        }

ion></select></div><div><label class="block text-sm mb-1">Inspection Status</label><select id="batch-inspection" class="w-full px-3 py-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600"><option>Accepted</option><option>Partially Accepted</option><option>Rejected</option></select></div><div><label class="block text-sm mb-1">Use-By Date</label><input type="date" id="batch-useby" class="w-full px-3 py-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600"></div><div><label class="block text-sm mb-1">Received By</label><input type="text" id="batch-received-by" class="w-full px-3 py-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600"></div><div><label class="block text-sm mb-1">Document Reference</label><input type="text" id="batch-doc-ref" class="w-full px-3 py-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600"></div><div class="sm:col-span-2"><label class="block text-sm mb-1">Notes / Quality Observations</label><textarea id="batch-notes" class="w-full px-3 py-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600" rows="2"></textarea></div></div><button onclick="receiveBatch()" class="w-full mt-4 py-3 bg-primary text-white rounded-lg hover:bg-rose-700 justify-center">Receive Batch & 🖨 Print Receipt</button></div></div>
                <div id="batch-tab-register" class="batch-content hidden"><div class="bg-card rounded-xl shadow-sm border border-theme overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-left min-w-[600px]"><thead class="bg-gray-50 dark:bg-gray-800 text-sm"><tr><th class="p-4">Batch #</th><th class="p-4">Source</th><th class="p-4">Weight (kg)</th><th class="p-4">Storage</th><th class="p-4">Use-By</th><th class="p-4">Status</th><th class="p-4">Actions</th></tr></thead><tbody class="divide-y divide-theme">${STATE.batches.map(b=>`<tr><td class="p-4 font-mono text-sm">${b.id}</td><td class="p-4">${b.source}</td><td class="p-4">${b.currentWeight}</td><td class="p-4">Chiller 1</td><td class="p-4">${b.useBy}</td><td class="p-4"><span class="px-2 py-1 ${b.status==='Active'?'bg-green-100 text-green-700':'bg-orange-100 text-orange-700'} rounded text-xs">${b.status}</span></td><td class="p-4"><button class="text-blue-500 hover:underline text-sm">View</button></td></tr>`).join('')}</tbody></table></div></div></div>
                <div id="batch-tab-cutting" class="batch-content hidden">
                    <div class="bg-card p-6 rounded-xl shadow-sm border border-theme mb-4"><h3 class="font-bold text-lg mb-4">Cutting & Packing Workflow</h3><div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4"><div class="sm:col-span-2"><label class="block text-sm mb-1 font-bold">Parent Batch</label><select id="parent-batch-select" onchange="renderChildBatches()" class="w-full px-3 py-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600 outline-none"><option value="">-- Select batch... --</option>${STATE.batches.map(b => `<option value="${b.id}">${b.id} (${b.source}) - ${b.weight}kg</option>`).join('')}</select></div><div><label class="block text-sm mb-1">Cutting Date</label><input type="date" class="w-full px-3 py-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600"></div></div><div class="grid grid-cols-1 sm:grid-cols-3 gap-4"><div><label class="block text-sm mb-1">Staff Member</label><input type="text" class="w-full px-3 py-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600"></div><div><label class="block text-sm mb-1">Total Parent Weight (kg)</label><input type="number" id="parent-weight-display" class="w-full px-3 py-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600 bg-gray-100 dark:bg-gray-800" readonly></div><div><label class="block text-sm mb-1">Parent Cost/kg (KES)</label><input type="number" id="parent-cost-display" class="w-full px-3 py-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600 bg-gray-100 dark:bg-gray-800" readonly></div></div></div>
                    <div id="child-batches-container" class="hidden bg-card p-6 rounded-xl shadow-sm border border-theme"><h4 class="font-bold text-md mb-2 text-primary">🔪 Convert Parent Batch into Sellable Products</h4><p class="text-xs text-muted mb-4">Enter the weight and cost/kg for each cut. Bones/Offcuts and Offal are included where applicable.</p><div class="overflow-x-auto"><table class="w-full text-left min-w-[720px]"><thead class="bg-gray-50 dark:bg-gray-800 text-sm"><tr><th class="p-3">Sellable Product</th><th class="p-3">Category</th><th class="p-3">Weight (kg)</th><th class="p-3">Cost / kg (KES)</th><th class="p-3">Subtotal (KES)</th><th class="p-3">Status</th></tr></thead><tbody id="child-batches-body" class="divide-y divide-theme"></tbody><tfoot class="bg-gray-50 dark:bg-gray-800 text-sm font-bold"><tr><td class="p-3" colspan="2">Totals</td><td class="p-3"><span id="cut-total-weight">0</span> kg</td><td class="p-3">—</td><td class="p-3">KES <span id="cut-total-cost">0</span></td><td class="p-3"><span id="cut-yield-pct" class="text-xs px-2 py-1 bg-blue-100 text-blue-700 rounded">Yield: 0%</span></td></tr></tfoot></table></div><button onclick="saveCutting()" class="w-full mt-4 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 justify-center font-bold">✅ Record Cutting & Update Inventory</button></div>
                </div>
                <div id="batch-tab-origin" class="batch-content hidden">
                    <div class="flex gap-2 mb-4"><button onclick="filterOrigin('today', this)" class="px-3 py-1 bg-primary text-white rounded text-sm">Today</button><button onclick="filterOrigin('week', this)" class="px-3 py-1 bg-gray-200 dark:bg-gray-700 rounded text-sm">This Week</button><button onclick="filterOrigin('month', this)" class="px-3 py-1 bg-gray-200 dark:bg-gray-700 rounded text-sm">This Month</button></div>
                    <div id="origin-stats" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6"><div class="bg-card p-5 rounded-xl shadow-sm border border-theme"><h3 class="font-bold text-lg mb-4 text-green-600">🐷 Oinklytics Farms Batches</h3><div class="space-y-2"><div class="flex justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded"><span>Total Batches</span><span class="font-bold">0</span></div><div class="flex justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded"><span>Total Weight</span><span class="font-bold">0 kg</span></div><div class="flex justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded"><span>Est. Margin</span><span class="font-bold text-green-600">0%</span></div></div></div><div class="bg-card p-5 rounded-xl shadow-sm border border-theme"><h3 class="font-bold text-lg mb-4 text-blue-600">🚛 External Supplier Batches</h3><div class="space-y-2"><div class="flex justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded"><span>Total Batches</span><span class="font-bold">0</span></div><div class="flex justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded"><span>Total Weight</span><span class="font-bold">0 kg</span></div><div class="flex justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded"><span>Est. Margin</span><span class="font-bold text-blue-600">0%</span></div></div></div></div>
                    <div class="bg-card rounded-xl shadow-sm border border-theme overflow-hidden"><h3 class="font-bold p-4 border-b border-theme">Supplier Ranking — Margin, Quality & Wastage</h3><div class="overflow-x-auto"><table class="w-full text-left min-w-[600px]"><thead class="bg-gray-50 dark:bg-gray-800 text-sm"><tr><th class="p-4">Source</th><th class="p-4">Batches</th><th class="p-4">Total kg</th><th class="p-4">Est. Sales (KES)</th><th class="p-4">Wastage (kg)</th><th class="p-4">Est. Margin</th><th class="p-4">Rating</th></tr></thead><tbody id="origin-ranking-body" class="divide-y divide-theme"><tr><td class="p-4 text-muted" colspan="7">No data</td></tr></tbody></table></div></div>
                </div>
            </div>`;
            setTimeout(generateBatchNumber, 50);
        }
        function generateBatchNumber() { const source = document.getElementById('batch-source')?.value; const date = new Date().toISOString().slice(0,10).replace(/-/g,''); const rand = Math.floor(Math.random() * 900) + 100; const prefix = source === 'OIN' ? 'OIN' : source === 'EXT' ? 'EXT-SUPPLIER' : 'SPOT-SUPPLIER'; const input = document.getElementById('batch-number'); if(input) input.value = `${prefix}-${date}-${rand}`; }
        function switchBatchTab(tab, btn) { document.querySelectorAll('.batch-content').forEach(c=>c.classList.add('hidden')); document.getElementById('batch-tab-'+tab).classList.remove('hidden'); document.querySelectorAll('.batch-tab').forEach(b=>{b.classList.remove('border-primary','text-primary','font-bold');b.classList.add('border-transparent','text-muted');}); btn.classList.add('border-primary','text-primary','font-bold'); btn.classList.remove('border-transparent','text-muted'); if(tab==='receive') generateBatchNumber(); else if(tab==='origin') filterOrigin('today', document.querySelector('#batch-tab-origin .flex.gap-2 button:first-child')); }

        function filterOrigin(period, btn) {
            const now = new Date();
            let start;
            if (period === 'today') { start = new Date(now.getFullYear(), now.getMonth(), now.getDate()); }
            else if (period === 'week') { const d = new Date(now); d.setDate(d.getDate() - d.getDay()); start = new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
            else { start = new Date(now.getFullYear(), now.getMonth(), 1); }
            const filtered = STATE.batches.filter(b => { const d = new Date((b.created_at || b.createdAt || '').replace(' ', 'T')); return !isNaN(d) && d >= start && d <= now; });
            const farm = filtered.filter(b => b.source && b.source.toLowerCase().includes('oink'));
            const ext = filtered.filter(b => !b.source || !b.source.toLowerCase().includes('oink'));
            const farmW = farm.reduce((s,b) => s + parseFloat(b.currentWeight || b.weight || 0), 0);
            const extW = ext.reduce((s,b) => s + parseFloat(b.currentWeight || b.weight || 0), 0);
            const farmCost = farm.reduce((s,b) => s + parseFloat(b.costPerKg || b.cost_per_kg || 0) * parseFloat(b.weight || 0), 0);
            const extCost = ext.reduce((s,b) => s + parseFloat(b.costPerKg || b.cost_per_kg || 0) * parseFloat(b.weight || 0), 0);
            const farmSales = farmW * 650; const extSales = extW * 600;
            const farmMargin = farmCost ? Math.round((farmSales - farmCost) / farmSales * 100) : 0;
            const extMargin = extCost ? Math.round((extSales - extCost) / extSales * 100) : 0;
            const statsDiv = document.getElementById('origin-stats');
            if (statsDiv) statsDiv.innerHTML =
                `<div class="bg-card p-5 rounded-xl shadow-sm border border-theme"><h3 class="font-bold text-lg mb-4 text-green-600">🐷 Oinklytics Farms Batches</h3><div class="space-y-2"><div class="flex justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded"><span>Total Batches</span><span class="font-bold">${farm.length}</span></div><div class="flex justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded"><span>Total Weight</span><span class="font-bold">${farmW.toFixed(1)} kg</span></div><div class="flex justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded"><span>Est. Margin</span><span class="font-bold text-green-600">${farmMargin}%</span></div></div></div>` +
                `<div class="bg-card p-5 rounded-xl shadow-sm border border-theme"><h3 class="font-bold text-lg mb-4 text-blue-600">🚛 External Supplier Batches</h3><div class="space-y-2"><div class="flex justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded"><span>Total Batches</span><span class="font-bold">${ext.length}</span></div><div class="flex justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded"><span>Total Weight</span><span class="font-bold">${extW.toFixed(1)} kg</span></div><div class="flex justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded"><span>Est. Margin</span><span class="font-bold text-blue-600">${extMargin}%</span></div></div></div>`;
            const rankingBody = document.getElementById('origin-ranking-body');
            if (rankingBody) {
                const allSources = [...new Set(filtered.map(b => b.source))].filter(Boolean);
                rankingBody.innerHTML = allSources.length ? allSources.map(s => {
                    const sb = filtered.filter(b => b.source === s);
                    const sw = sb.reduce((a,b) => a + parseFloat(b.currentWeight || b.weight || 0), 0);
                    const sc = sb.reduce((a,b) => a + parseFloat(b.costPerKg || b.cost_per_kg || 0) * parseFloat(b.weight || 0), 0);
                    const ss = sw * 650;
                    const sm = sc ? Math.round((ss - sc) / ss * 100) : 0;
                    const stars = sm >= 30 ? '⭐⭐⭐⭐⭐' : sm >= 20 ? '⭐⭐⭐⭐' : sm >= 10 ? '⭐⭐⭐' : '⭐⭐';
                    return `<tr><td class="p-4">${s}</td><td class="p-4">${sb.length}</td><td class="p-4">${sw.toFixed(1)}</td><td class="p-4">KES ${ss.toLocaleString()}</td><td class="p-4">0</td><td class="p-4 text-green-600 font-bold">${sm}%</td><td class="p-4">${stars}</td></tr>`;
                }).join('') : '<tr><td class="p-4 text-muted" colspan="7">No data</td></tr>';
            }
            document.querySelectorAll('#batch-tab-origin .flex.gap-2 button').forEach(b => {
                b.classList.remove('bg-primary', 'text-white');
                b.classList.add('bg-gray-200', 'dark:bg-gray-700');
            });
            if (btn) { btn.classList.remove('bg-gray-200', 'dark:bg-gray-700'); btn.classList.add('bg-primary', 'text-white'); }
        }

        async function receiveBatch() {
            const supplier = document.getElementById('batch-supplier')?.value.trim();
            const batchNo = document.getElementById('batch-number')?.value;
            const weight = parseFloat(document.getElementById('batch-weight')?.value);
            const cost = parseFloat(document.getElementById('batch-cost')?.value);
            const location = document.getElementById('batch-location')?.value;
            const inspection = document.getElementById('batch-inspection')?.value;
            const useBy = document.getElementById('batch-useby')?.value;
            const receivedBy = document.getElementById('batch-received-by')?.value.trim();
            if (!weight || !cost) { alert('Weight and Cost per kg are required.'); return; }
            const data = { id: batchNo, source: supplier || 'Unknown', weight, current_weight: weight, cost_per_kg: cost, storage: location, inspection, use_by: useBy, received_by: receivedBy, status: 'Active' };
            const res = await apiPost('batches', data);
            if (res && res.success) {
                STATE.batches.unshift({ id: batchNo, source: supplier || 'Unknown', weight, currentWeight: weight, costPerKg: cost, storage: location, inspection, useBy, receivedBy, status: 'Active', created_at: new Date().toLocaleString() });
                printBatchReceipt(STATE.batches[0]);
                loadAllData();
            }
        }
        function printBatchReceipt(batch) {
            const receipt = `<div class="text-center p-4 font-mono text-xs"><h2 class="font-bold text-sm">OINKLYTICS BUTCHERY</h2><p class="text-xs text-muted">Batch Receipt</p><div class="border border-dashed border-black p-3 mt-2 text-left"><p>Batch: <b>${batch.id}</b></p><p>Source: ${batch.source}</p><p>Weight: ${batch.weight} kg</p><p>Cost/kg: KES ${batch.costPerKg}</p><p>Use-By: ${batch.useBy || 'N/A'}</p><p>Location: ${batch.storage || 'N/A'}</p><p>Date: ${new Date().toLocaleString()}</p></div></div>`;
            document.getElementById('modals-container').innerHTML = `<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm no-print fade-in p-4"><div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-xl w-full max-w-sm border border-theme"><div id="printable-receipt">${receipt}</div><div class="flex gap-2 mt-4 no-print"><button onclick="window.print()" class="flex-1 py-3 bg-blue-600 text-white rounded-lg justify-center">🖨 Print Receipt</button><button onclick="closeModal()" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-lg justify-center">Save Receipt</button></div></div></div>`;
        }
        function openSavedReceipts() {
            const rows = STATE.batches.map(b => `<tr><td class="p-3 font-mono text-sm font-bold">${b.id}</td><td class="p-3">${b.source}</td><td class="p-3">${b.currentWeight || b.weight} kg</td><td class="p-3 text-sm">${b.created_at || 'N/A'}</td><td class="p-3"><button onclick="printSavedReceipt('${b.id}')" class="px-3 py-1 bg-blue-600 text-white rounded text-xs">🖨</button><button onclick="deleteReceiptBatch('${b.id}')" class="px-3 py-1 bg-red-600 text-white rounded text-xs ml-1">🗑</button></td></tr>`).join('') || '<tr><td class="p-3 text-center text-muted" colspan="5">No saved receipts</td></tr>';
            document.getElementById('modals-container').innerHTML = `<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm no-print fade-in p-4"><div class="bg-card p-6 rounded-xl shadow-xl w-full max-w-xl border border-theme max-h-[90vh] overflow-y-auto"><div class="flex justify-between items-center mb-4"><h3 class="font-bold text-lg">Saved Batch Receipts</h3><span class="text-sm text-muted">${STATE.batches.length} total</span></div><table class="w-full text-left"><thead class="bg-gray-50 dark:bg-gray-800 text-sm text-muted"><tr><th class="p-3">Batch #</th><th class="p-3">Source</th><th class="p-3">Weight</th><th class="p-3">Date</th><th class="p-3">Actions</th></tr></thead><tbody class="divide-y divide-theme">${rows}</tbody></table><button onclick="closeModal()" class="mt-4 w-full py-3 bg-gray-200 dark:bg-gray-700 rounded-lg justify-center">Close</button></div></div>`;
        }
        function printSavedReceipt(id) { const b = STATE.batches.find(x => x.id === id); if (b) printBatchReceipt(b); }
        async function deleteReceiptBatch(id) { if (!confirm(`Delete receipt for batch "${id}"?`)) return; await apiDel('batches', id); await loadAllData(); openSavedReceipts(); }

        const CUT_TEMPLATE = [
            { name: 'Pork Chops',    category: 'Pork Cuts',    defaultPrice: 650 },
            { name: 'Pork Ribs',     category: 'Pork Cuts',    defaultPrice: 600 },
            { name: 'Pork Belly',    category: 'Pork Cuts',    defaultPrice: 700 },
            { name: 'Pork Shoulder', category: 'Pork Cuts',    defaultPrice: 550 },
            { name: 'Pork Leg',      category: 'Pork Cuts',    defaultPrice: 580 },
            { name: 'Bones/Offcuts', category: 'By-Products',  defaultPrice: 200 },
            { name: 'Offal',         category: 'Offal',        defaultPrice: 280 }
        ];

        function renderChildBatches() {
            const parentId = document.getElementById('parent-batch-select').value;
            const container = document.getElementById('child-batches-container');
            const tbody = document.getElementById('child-batches-body');
            const weightDisplay = document.getElementById('parent-weight-display');
            const costDisplay = document.getElementById('parent-cost-display');
            if(!parentId) { container.classList.add('hidden'); return; }
            const parent = STATE.batches.find(b => b.id === parentId);
            if(weightDisplay) weightDisplay.value = parent?.weight || 0;
            if(costDisplay) costDisplay.value = parent?.costPerKg || 0;
            const existing = (parent && parent.cutProducts) ? parent.cutProducts : [];
            const rows = CUT_TEMPLATE.map((cut, i) => {
                const match = existing.find(e => e.name === cut.name);
                const w = match ? match.weight : 0;
                const cpk = match && match.costPerKg ? match.costPerKg : (parent?.costPerKg || cut.defaultPrice);
                return `<tr>
                    <td class="p-3 font-bold">${cut.name}</td>
                    <td class="p-3"><span class="text-xs px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded">${cut.category}</span></td>
                    <td class="p-3"><input type="number" step="0.1" min="0" data-cut-idx="${i}" data-field="weight" value="${w}" oninput="recalcCutTotals()" class="w-24 px-2 py-2 rounded border dark:bg-gray-700 dark:border-gray-600"></td>
                    <td class="p-3"><input type="number" step="1" min="0" data-cut-idx="${i}" data-field="cost" value="${cpk}" oninput="recalcCutTotals()" class="w-28 px-2 py-2 rounded border dark:bg-gray-700 dark:border-gray-600"></td>
                    <td class="p-3">KES <span data-cut-subtotal="${i}">${(w*cpk).toFixed(0)}</span></td>
                    <td class="p-3"><span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs">${match ? 'Existing' : 'New'}</span></td>
                </tr>`;
            }).join('');
            tbody.innerHTML = rows;
            container.classList.remove('hidden');
            recalcCutTotals();
        }

        function recalcCutTotals() {
            const parentId = document.getElementById('parent-batch-select').value;
            const parent = STATE.batches.find(b => b.id === parentId);
            const parentWeight = parent?.weight || 0;
            let totalW = 0, totalC = 0;
            CUT_TEMPLATE.forEach((_, i) => {
                const w = parseFloat(document.querySelector(`input[data-cut-idx="${i}"][data-field="weight"]`)?.value) || 0;
                const c = parseFloat(document.querySelector(`input[data-cut-idx="${i}"][data-field="cost"]`)?.value) || 0;
                const sub = w * c;
                const subEl = document.querySelector(`span[data-cut-subtotal="${i}"]`);
                if (subEl) subEl.textContent = sub.toFixed(0);
                totalW += w; totalC += sub;
            });
            document.getElementById('cut-total-weight').textContent = totalW.toFixed(2);
            document.getElementById('cut-total-cost').textContent = totalC.toFixed(0);
            const yieldPct = parentWeight > 0 ? (totalW / parentWeight * 100) : 0;
            const yEl = document.getElementById('cut-yield-pct');
            yEl.textContent = `Yield: ${yieldPct.toFixed(1)}%`;
            yEl.className = 'text-xs px-2 py-1 rounded ' + (yieldPct > 100 ? 'bg-red-100 text-red-700' : yieldPct >= 85 ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700');
        }

        function saveCutting() {
            const parentId = document.getElementById('parent-batch-select').value;
            if(!parentId) { alert('Select a parent batch first.'); return; }
            const parent = STATE.batches.find(b => b.id === parentId);
            const cuts = CUT_TEMPLATE.map((cut, i) => {
                const w = parseFloat(document.querySelector(`input[data-cut-idx="${i}"][data-field="weight"]`)?.value) || 0;
                const c = parseFloat(document.querySelector(`input[data-cut-idx="${i}"][data-field="cost"]`)?.value) || 0;
                return { name: cut.name, category: cut.category, weight: w, costPerKg: c };
            }).filter(x => x.weight > 0);
            const totalW = cuts.reduce((s,x)=>s+x.weight,0);
            if(totalW > parent.weight) { if(!confirm(`Total cut weight ${totalW}kg exceeds parent ${parent.weight}kg. Save anyway?`)) return; }
            parent.cutProducts = cuts;
            alert(`✅ Cutting recorded for ${parentId}: ${cuts.length} products, ${totalW.toFixed(2)}kg total.`);
        }

omers | 8 active batches</p></div></div></div>

            <div id="set-tab-campaigns" class="set-content hidden"><div class="bg-card p-6 rounded-xl shadow-sm border border-theme"><h3 class="font-bold text-lg mb-2">🎁 Reward Campaigns</h3><p class="text-sm text-muted mb-4">Campaigns require Admin approval before activation</p><div class="bg-card rounded-xl shadow-sm border border-theme overflow-hidden mb-6"><div class="overflow-x-auto"><table class="w-full text-left min-w-[600px]"><thead class="bg-gray-50 dark:bg-gray-800 text-sm"><tr><th class="p-4">Campaign</th><th class="p-4">How it Works</th><th class="p-4">Purpose</th><th class="p-4">Status</th><th class="p-4">Action</th></tr></thead><tbody class="divide-y divide-theme"><tr><td class="p-4 font-bold">Launch Reward</td><td class="p-4 text-sm">Double points for first 100 customers</td><td class="p-4 text-sm">Acquisition</td><td class="p-4"><span class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs">Active</span></td><td class="p-4"><button class="text-blue-500 text-sm">Edit</button></td></tr><tr><td class="p-4 font-bold">Slow-Moving Cut Boost</td><td class="p-4 text-sm">1.5x points on offal and bones</td><td class="p-4 text-sm">Reduce Wastage</td><td class="p-4"><span class="px-2 py-1 bg-yellow-100 text-yellow-700 rounded text-xs">Pending</span></td><td class="p-4"><button class="text-green-500 text-sm">Approve</button></td></tr><tr><td class="p-4 font-bold">Family Pack Reward</td><td class="p-4 text-sm">Flat 200 pts for purchases over KES 2000</td><td class="p-4 text-sm">Increase Ticket Size</td><td class="p-4"><span class="px-2 py-1 bg-gray-100 text-gray-700 rounded text-xs">Draft</span></td><td class="p-4"><button class="text-blue-500 text-sm">Edit</button></td></tr><tr><td class="p-4 font-bold">Referral Reward</td><td class="p-4 text-sm">500 pts for each referred customer</td><td class="p-4 text-sm">Growth</td><td class="p-4"><span class="px-2 py-1 bg-gray-100 text-gray-700 rounded text-xs">Draft</span></td><td class="p-4"><button class="text-blue-500 text-sm">Edit</button></td></tr><tr><td class="p-4 font-bold">Monthly Top Buyer</td><td class="p-4 text-sm">Bonus 1000 pts for highest spender</td><td class="p-4 text-sm">Retention</td><td class="p-4"><span class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs">Active</span></td><td class="p-4"><button class="text-blue-500 text-sm">Edit</button></td></tr></tbody></table></div></div><h4 class="font-bold mb-2">Current Points Rules Summary</h4><div class="p-4 bg-gray-50 dark:bg-gray-800 rounded-lg text-sm space-y-1"><p>• Earn Rate: <strong>${STATE.settings.earnRate} KES</strong> spent = 1 point</p><p>• Point Value: <strong>${STATE.settings.pointValue} KES</strong> per point redeemed</p><p>• Minimum Redemption: <strong>${STATE.settings.minRedeem} points</strong></p><p>• Maximum Redemption: <strong>${STATE.settings.maxRedeemPct}%</strong> of bill</p><p>• Points Expiry: <strong>${STATE.settings.pointsExpiry} months</strong></p></div></div></div></div>`;
            const ut = document.getElementById('users-table-body'); if(ut) { ut.innerHTML = STATE.users.map(u => `<tr><td class="p-4">${u.name}</td><td class="p-4 font-mono text-sm truncate max-w-[150px]">${u.username}</td><td class="p-4"><span class="px-2 py-1 ${u.role==='admin'?'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-400':u.role==='supervisor'?'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400':'bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-300'} rounded text-xs">${u.role.charAt(0).toUpperCase()+u.role.slice(1)}</span></td><td class="p-4"><span class="text-green-500">${u.status}</span></td><td class="p-4 text-sm">${u.lastLogin}</td><td class="p-4">${u.username!=='admin'?`<button onclick="toggleAdmin(${u.id})" class="text-blue-500 hover:underline mr-3 text-sm whitespace-nowrap">${u.role==='admin'?'Demote':'Make Admin'}</button><button onclick="deleteUser(${u.id})" class="text-red-500 hover:underline text-sm whitespace-nowrap">Delete</button>`:'<span class="text-muted text-xs italic">Primary</span>'}</td></tr>`).join(''); } }
        function switchSetTab(tab, btn) { document.querySelectorAll('.set-content').forEach(c=>c.classList.add('hidden')); document.getElementById('set-tab-'+tab).classList.remove('hidden'); document.querySelectorAll('.set-tab').forEach(b=>{b.classList.remove('border-primary','text-primary','font-bold');b.classList.add('border-transparent','text-muted');}); btn.classList.add('border-primary','text-primary','font-bold'); btn.classList.remove('border-transparent','text-muted'); }
        function openUserModal() { document.getElementById('modals-container').innerHTML = `<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm no-print fade-in p-4"><div class="bg-card p-6 rounded-xl shadow-xl w-full max-w-lg border border-theme max-h-[90vh] overflow-y-auto"><div class="flex justify-between items-center mb-4"><h3 class="font-bold text-lg">Add / Edit User</h3><button onclick="closeModal()" class="text-muted w-10 h-10 justify-center"><i class="fas fa-times"></i></button></div><div class="space-y-4"><div><label class="block text-sm mb-1">Full Name</label><input type="text" id="new-user-name" class="w-full px-3 py-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600"></div><div><label class="block text-sm mb-1">Username</label><input type="text" id="new-user-email" class="w-full px-3 py-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600"></div><div><label class="block text-sm mb-1">Password</label><input type="password" id="new-user-pass" class="w-full px-3 py-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600"></div><div><label class="block text-sm mb-1">Role</label><select id="new-user-role" class="w-full px-3 py-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600"><option value="admin">Admin</option><option value="supervisor">Supervisor</option><option value="cashier" selected>Cashier</option></select></div></div><div class="flex gap-2 mt-6"><button onclick="closeModal()" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-lg justify-center">Cancel</button><button onclick="saveNewUser()" class="flex-1 py-3 bg-primary text-white rounded-lg justify-center">Save</button></div></div></div>`; }
        async function saveNewUser() { const n=document.getElementById('new-user-name').value; const e=document.getElementById('new-user-email').value.trim().toLowerCase(); const p=document.getElementById('new-user-pass').value; const r=document.getElementById('new-user-role').value; if(!n||!e||!p) return alert('Fill all fields'); if(STATE.users.find(u=>u.username===e)) return alert('User exists'); const result = await apiPost('users', {name:n, username:e, password:p, role:r}); if(result && result.success) { STATE.users.push({id:result.id, name:n, username:e, password:p, role:r, status:'Active', lastLogin:'Never'}); } closeModal(); renderSettings(document.getElementById('main-content')); setTimeout(()=>{const b=Array.from(document.querySelectorAll('.set-tab')).find(x=>x.innerText.includes('User')); if(b) switchSetTab('users',b);},50); }
        async function toggleAdmin(id) { const u=STATE.users.find(x=>x.id===id); if(u && u.username!=='admin') { u.role = u.role==='admin'?'supervisor':'admin'; await apiPut('users', {toggleRole:true}, id); renderSettings(document.getElementById('main-content')); setTimeout(()=>{const b=Array.from(document.querySelectorAll('.set-tab')).find(x=>x.innerText.includes('User')); if(b) switchSetTab('users',b);},50); } }
        async function deleteUser(id) { const u=STATE.users.find(x=>x.id===id); if(u && u.username!=='admin' && confirm(`Delete ${u.name}?`)) { STATE.users = STATE.users.filter(x=>x.id!==id); await apiDel('users', id); renderSettings(document.getElementById('main-content')); setTimeout(()=>{const b=Array.from(document.querySelectorAll('.set-tab')).find(x=>x.innerText.includes('User')); if(b) switchSetTab('users',b);},50); } }

        // Initialize
        initTheme();
        setInterval(() => { STATE.equipment.forEach(eq => { if(eq.type==='Chiller') eq.temp=parseFloat((2+Math.random()*3).toFixed(1)); if(eq.type==='Scale') eq.weight=parseFloat((Math.random()*5).toFixed(2)); if(eq.type==='Printer') eq.paper=Math.max(10, eq.paper-Math.floor(Math.random()*2)); }); if(document.getElementById('equipment-grid')) { renderEquipmentGrid(); renderEquipmentHistory(); } }, 10000);
        setInterval(() => { if (document.getElementById('report-result') && _reportParams) generateReport(); }, 30000);
    </script>
